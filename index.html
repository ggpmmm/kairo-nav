<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开罗游戏库</title>
    <style>
        :root {
            --bg-start: #f8fafc;
            --bg-end: #e2e8f0;
            --card: rgba(255, 255, 255, 0.8);
            --text: #1e293b;
            --accent: #2563eb;
            --sub: #64748b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); 
            min-height: 100vh;
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding-bottom: 50px; 
        }
        .header { text-align:center; padding:60px 20px 30px; }
        .logo { font-size:34px; font-weight:800; color: #0f172a; }
        .search { width:90%; max-width:500px; margin:25px auto; }
        .search input { 
            width:100%; padding:14px 20px; border-radius:16px; border:none; 
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); font-size: 16px; 
        }
        .container { width:90%; max-width:900px; margin:auto; }
        .section-title { font-size:20px; font-weight:700; margin:35px 0 15px 5px; color: #334155; }
        .games { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:16px; }
        
        .card { 
            background: var(--card); padding:20px; border-radius:24px; cursor: pointer; 
            transition: all 0.3s ease; text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 12px; object-fit: cover; }
        .card-name { font-weight: 600; font-size: 14px; }

        /* 新增：日志区域样式 */
        .update-box { background: var(--card); padding: 25px; border-radius: 24px; margin-top: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .update-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        .update-item { margin-bottom: 10px; font-size: 14px; color: var(--sub); }
        .footer { text-align:center; color:var(--sub); padding:40px 20px; font-size: 12px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: #ffffff; padding: 30px; border-radius: 32px; width: 100%; max-width: 450px; }
        .close-btn { color: var(--accent); cursor: pointer; font-weight: 600; float: right; }
        #modalDesc { line-height: 1.6; color: var(--sub); white-space: pre-line; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">开罗游戏库</div>
    <div class="search"><input type="text" id="search" placeholder="搜索游戏..."></div>
</div>

<div class="container" id="gameContainer"></div>

<div class="container">
    <div class="update-box">
        <div class="update-title">最近更新日志</div>
        <div class="update-item">2026-06-17：新增飞空艇探险物语</div>
        <div class="update-item">2026-06-10：新增大海贼探险物语DX</div>
        <div class="update-item">2026-06-02：新增大海贼探险物语</div>
    </div>
    <div class="footer">开罗游戏库 © 2026</div>
</div>

<script>
    const gameData = {
        "热门精选": [
            {name:"大海贼探险DX", icon:"./images/daxianhai.png", desc:"探索未知海域，建立属于你的海贼帝国。"},
            {name:"游戏开发国", icon:"https://via.placeholder.com/64", desc:"从车库开始，成长为顶级的游戏开发公司。"},
            {name:"魔王城物语", icon:"https://via.placeholder.com/64", desc:"功能说明：\n金钱不减反增、研究不减反增"}
        ],
        "模拟经营": [
            {name:"百货商场物语", icon:"https://via.placeholder.com/64", desc:"经营你的百货大楼，吸引全球顾客。"}
        ]
    };

    const container = document.getElementById("gameContainer");

    function render(keyword="") {
        container.innerHTML="";
        for(const category in gameData) {
            const games = gameData[category].filter(item => item.name.includes(keyword));
            if(games.length === 0) continue;

            let html = `<div class="section-title">${category}</div><div class="games">`;
            games.forEach(game => {
                html += `
                    <div class="card" onclick="showDetail(this)" data-name="${game.name}" data-desc="${game.desc.replace(/\n/g, '\\n')}">
                        < img src="${game.icon}" alt="${game.name}">
                        <div class="card-name">${game.name}</div>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        }
    }

    function showDetail(el) {
        document.getElementById("modalTitle").innerText = el.getAttribute("data-name");
        document.getElementById("modalDesc").innerText = el.getAttribute("data-desc").replace(/\\n/g, '\n');
        document.getElementById("detailModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("detailModal").style.display = "none"; }

    document.getElementById("search").addEventListener("input", e => render(e.target.value));
    render();
</script>

<div id="detailModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">关闭</span>
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p >
    </div>
</div>

</body>
</html>
