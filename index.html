<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开罗游戏导航</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card-hover:#334155;
    --text:#f8fafc;
    --sub:#94a3b8;
    --accent:#38bdf8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:"Microsoft YaHei",sans-serif;
}

.header{
    text-align:center;
    padding:40px 20px;
}

.logo{
    font-size:38px;
    font-weight:bold;
}

.desc{
    margin-top:10px;
    color:var(--sub);
}

.search{
    width:90%;
    max-width:700px;
    margin:25px auto;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:var(--card);
    color:white;
    font-size:16px;
    outline:none;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
}

.section{
    margin-bottom:40px;
}

.section-title{
    font-size:24px;
    margin-bottom:15px;
    color:var(--accent);
}

.games{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

.card{
    background:var(--card);
    padding:18px;
    border-radius:16px;
    cursor:pointer;
    transition:.2s;
    border:1px solid rgba(255,255,255,.05);
}

.card:hover{
    background:var(--card-hover);
    transform:translateY(-3px);
}

.game-name{
    font-size:18px;
    font-weight:bold;
}

.game-info{
    margin-top:8px;
    color:var(--sub);
    font-size:13px;
}

.update-box{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    margin-top:30px;
}

.update-title{
    font-size:24px;
    margin-bottom:15px;
}

.update-item{
    margin-bottom:15px;
    line-height:1.8;
}

.footer{
    text-align:center;
    color:var(--sub);
    padding:40px 20px;
}

.footer a{
    color:var(--accent);
    text-decoration:none;
}

@media(max-width:768px){

.logo{
    font-size:28px;
}

.games{
    grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<div class="header">

<div class="logo">
🎮 开罗游戏导航
</div>

<div class="desc">
汉化版 · Steam版 · Debug版
</div>

<div class="search">
<input
type="text"
id="search"
placeholder="搜索游戏..."
>
</div>

</div>

<div class="container" id="gameContainer"></div>

<div class="container">

<div class="update-box">

<div class="update-title">
📢 更新日志
</div>

<div class="update-item">
2026-06-17<br>
新增飞空艇探险 Steam版
</div>

<div class="update-item">
2026-06-10<br>
新增大海贼探险 DX
</div>

<div class="update-item">
2026-06-01<br>
更新魔王城物语汉化版
</div>

</div>

</div>

<div class="footer">
开罗游戏导航 © 2026
</div>

<script>

const gameData = {

"🔥 热门推荐":[
{
name:"大海贼探险DX",
url:"#"
},
{
name:"游戏开发国",
url:"#"
},
{
name:"开罗拉面店",
url:"#"
},
{
name:"冒险村物语",
url:"#"
}
],

"🏪 经营养成":[
{
name:"百货商场物语",
url:"#"
},
{
name:"便利店开业日记",
url:"#"
},
{
name:"住宅梦物语",
url:"#"
},
{
name:"创意蛋糕店",
url:"#"
}
],

"⚔️ 冒险探索":[
{
name:"大海贼探险",
url:"#"
},
{
name:"魔王城物语",
url:"#"
},
{
name:"飞空艇探险队",
url:"#"
},
{
name:"冒险村物语",
url:"#"
}
],

"🍜 餐饮系列":[
{
name:"开罗拉面店",
url:"#"
},
{
name:"美食梦物语",
url:"#"
},
{
name:"创意蛋糕店",
url:"#"
}
],

"⚽ 体育竞技":[
{
name:"冠军足球物语",
url:"#"
},
{
name:"风云拳击物语",
url:"#"
},
{
name:"网球俱乐部物语",
url:"#"
}
]

};

const container =
document.getElementById("gameContainer");

function render(keyword=""){

container.innerHTML="";

for(const category in gameData){

const games =
gameData[category].filter(
item =>
item.name.includes(keyword)
);

if(games.length===0) continue;

let html = `
<div class="section">
<div class="section-title">
${category}
</div>

<div class="games">
`;

games.forEach(game=>{

html += `
<div class="card"
onclick="openGame('${game.url}')">

<div class="game-name">
${game.name}
</div>

<div class="game-info">
点击查看详情
</div>

</div>
`;

});

html += `
</div>
</div>
`;

container.innerHTML += html;

}

}

function openGame(url){

if(url === "#"){
alert("这里填写游戏下载链接");
return;
}

window.open(url);

}

document
.getElementById("search")
.addEventListener("input",e=>{
render(e.target.value);
});

render();

</script>

</body>
</html>
