<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开罗游戏库</title>
    <style>
        :root {
            /* 浅色渐变背景 */
            --bg-start: #f8fafc;
            --bg-end: #e2e8f0;
            --card: rgba(255, 255, 255, 0.8);
            --text: #1e293b;
            --accent: #2563eb;
            --sub: #64748b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); 
            min-height: 100vh;
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding-bottom: 50px; 
        }
        
        .header { text-align:center; padding:60px 20px 30px; }
        .logo { font-size:34px; font-weight:800; color: #0f172a; letter-spacing: -0.5px; }
        
        .search { width:90%; max-width:500px; margin:25px auto; }
        .search input { 
            width:100%; padding:14px 20px; border-radius:16px; border:none; 
            background: rgba(255,255,255,0.6); 
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            color:var(--text); font-size: 16px; outline:none; 
        }

        .container { width:90%; max-width:900px; margin:auto; }
        .section-title { font-size:20px; font-weight:700; margin:35px 0 15px 5px; color: #334155; }
        .games { display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:16px; }
        
        .card { 
            background: var(--card); padding:20px; border-radius:24px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .update-box { background: var(--card); padding: 25px; border-radius: 24px; margin-top: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .update-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        .update-item { margin-bottom: 10px; font-size: 14px; color: var(--sub); }

        .footer { text-align:center; color:var(--sub); padding:40px 20px; font-size: 12px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: #ffffff; padding: 30px; border-radius: 32px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .close-btn { color: var(--accent); cursor: pointer; font-weight: 600; float: right; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">开罗游戏库</div>
    <div class="search">
        <input type="text" id="search" placeholder="搜索游戏...">
    </div>
</div>

<div class="container" id="gameContainer"></div>

<div class="container">
    <div class="update-box">
        <div class="update-title">更新记录</div>
        <div class="update-item">2026-06-17：新增飞空艇探险 Steam版</div>
        <div class="update-item">2026-06-10：新增大海贼探险 DX</div>
    </div>
    <div class="footer">开罗游戏库 © 2026</div>
</div>

<div id="detailModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">关闭</span>
        <h2 id="modalTitle" style="margin-bottom:15px;"></h2>
        <p id="modalDesc" style="line-height:1.6; color:var(--sub);"></p >
    </div>
</div>

<script>
    const gameData = {
        "热门精选": [
            {name:"大海贼探险DX", desc:"探索未知海域，建立属于你的海贼帝国。"},
            {name:"游戏开发国", desc:"从车库开始，成长为顶级的游戏开发公司。"}
        ],
        "模拟经营": [
            {name:"百货商场物语", desc:"经营你的百货大楼，吸引全球顾客。"}
        ]
    };

    const container = document.getElementById("gameContainer");
    const modal = document.getElementById("detailModal");

    function render(keyword="") {
        container.innerHTML="";
        for(const category in gameData) {
            const games = gameData[category].filter(item => item.name.includes(keyword));
            if(games.length === 0) continue;

            let html = `<div class="section-title">${category}</div><div class="games">`;
            games.forEach(game => {
                html += `
                    <div class="card" onclick="showDetail('${game.name}', '${game.desc}')">
                        <div style="font-weight:600;">${game.name}</div>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        }
    }

    function showDetail(name, desc) {
        document.getElementById("modalTitle").innerText = name;
        document.getElementById("modalDesc").innerText = desc;
        modal.style.display = "flex";
    }

    function closeModal() { modal.style.display = "none"; }

    document.getElementById("search").addEventListener("input", e => render(e.target.value));
    render();
</script>
</body>
</html>
